version: '3.8'

services:

  productservice:
    build:
      context: ./ProductService
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    container_name: productservice

  orderservice:
    build:
      context: ./OrderService
      dockerfile: Dockerfile
    ports:
      - "5002:8080"
    container_name: orderservice
    depends_on:
      - productservice